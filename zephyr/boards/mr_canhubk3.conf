# NXP S32K344 (mr_canhubk3) configuration -- 320KB RAM
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_SOMEIP_MESSAGE_POOL_SIZE=8
CONFIG_SOMEIP_MAX_PAYLOAD_SIZE=1400
CONFIG_SOMEIP_MAX_SUBSCRIPTIONS=4
CONFIG_SOMEIP_MAX_PENDING_CALLS=4
CONFIG_SOMEIP_THREAD_STACK_SIZE=2048

# Disable optional features to save memory
CONFIG_SOMEIP_TRANSPORT_TCP=n
CONFIG_SOMEIP_E2E=n
