# Common Zephyr configuration for SOME/IP stack
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_POSIX_API=y


CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y


CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_SOMEIP=y
CONFIG_SOMEIP_TRANSPORT_UDP=y
CONFIG_SOMEIP_TRANSPORT_TCP=y
CONFIG_SOMEIP_SD=y
CONFIG_SOMEIP_RPC=y
CONFIG_SOMEIP_EVENTS=y
CONFIG_SOMEIP_E2E=y
CONFIG_SOMEIP_TP=y
