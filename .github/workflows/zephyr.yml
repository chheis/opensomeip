name: Zephyr Build & Test
on:
  push:
    branches: ["main","feature/zephyr-port"]
    paths-ignore: ['**/*.md','docs/**','LICENSE','.cursor/**']
  pull_request:
    branches: ["main"]
    paths-ignore: ['**/*.md','docs/**','LICENSE','.cursor/**']

permissions:
  contents: read

jobs:
  host-build:
    name: Host Build + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & Test
        run: |
          cmake -B build -DBUILD_TESTS=ON -DBUILD_EXAMPLES=OFF -DSAFETY_LEVEL=NONE
          cmake --build build -j$(nproc)
          cd build && ctest --output-on-failure --timeout 30 --no-tests=error --output-junit junit_results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-zephyr-host
          path: build/junit_results.xml
          retention-days: 14

  zephyr-native-sim:
    name: Zephyr native_sim
    runs-on: ubuntu-latest
    container: { image: "ghcr.io/zephyrproject-rtos/ci:v0.27.4" }
    env:
      ZEPHYR_SDK_INSTALL_DIR: /opt/zephyr-sdk-0.17.0
    steps:
      - uses: actions/checkout@v4
      - name: Install Python 3.12
        run: |
          apt-get update -qq
          apt-get install -y -qq software-properties-common > /dev/null
          add-apt-repository -y ppa:deadsnakes/ppa > /dev/null 2>&1
          apt-get update -qq
          apt-get install -y -qq python3.12 python3.12-venv > /dev/null
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 2
          python3.12 -m ensurepip --upgrade
          python3.12 -m pip install --upgrade pip
      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.0/zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz -C /opt/
          /opt/zephyr-sdk-0.17.0/setup.sh -c
      - name: Init Zephyr
        run: |
          python3.12 -m pip install jsonschema west
          west init --mr v4.3.0 /tmp/zp && cd /tmp/zp
          west update --narrow -o=--depth=1 && west zephyr-export
          python3.12 -m pip install -r /tmp/zp/zephyr/scripts/requirements.txt
      - name: Build & run test_core
        env: { ZEPHYR_BASE: /tmp/zp/zephyr }
        run: |
          west build -b native_sim zephyr/tests/test_core -d build/ns_tc --pristine auto
          if timeout 30 build/ns_tc/zephyr/zephyr.exe > /tmp/test_core.log 2>&1; then
            rc=0
          else
            rc=$?
          fi
          cat /tmp/test_core.log
          if [ "$rc" -eq 124 ]; then
            grep -Eq "=== Results: [0-9]+ passed, 0 failed ===" /tmp/test_core.log || exit 1
          elif [ "$rc" -ne 0 ]; then
            exit "$rc"
          fi
      - name: Convert test_core results to JUnit XML
        if: always()
        run: python3 scripts/zephyr_to_junit.py /tmp/test_core.log test_core /tmp/test_core_junit.xml || true
      - name: Build & run test_transport
        env: { ZEPHYR_BASE: /tmp/zp/zephyr }
        run: |
          west build -b native_sim zephyr/tests/test_transport -d build/ns_tp --pristine auto
          if timeout 30 build/ns_tp/zephyr/zephyr.exe > /tmp/test_transport.log 2>&1; then
            rc=0
          else
            rc=$?
          fi
          cat /tmp/test_transport.log
          if [ "$rc" -eq 124 ]; then
            grep -Eq "=== Results: [0-9]+ passed, 0 failed ===" /tmp/test_transport.log || exit 1
          elif [ "$rc" -ne 0 ]; then
            exit "$rc"
          fi
      - name: Convert test_transport results to JUnit XML
        if: always()
        run: python3 scripts/zephyr_to_junit.py /tmp/test_transport.log test_transport /tmp/test_transport_junit.xml || true
      - name: Upload Zephyr native_sim test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-zephyr-native-sim
          path: /tmp/*_junit.xml
          retention-days: 14
      - name: Build & run someip_echo
        env: { ZEPHYR_BASE: /tmp/zp/zephyr }
        run: |
          west build -b native_sim zephyr/samples/someip_echo -d build/ns_echo --pristine auto
          # someip_echo is a sample that may run continuously.
          # Accept timeout exit code 124, but fail on any other non-zero code.
          if timeout 30 build/ns_echo/zephyr/zephyr.exe; then
            rc=0
          else
            rc=$?
          fi
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
            exit "$rc"
          fi
      - name: Build someip_sd_client
        env: { ZEPHYR_BASE: /tmp/zp/zephyr }
        run: west build -b native_sim zephyr/samples/someip_sd_client -d build/ns_sd --pristine auto

  zephyr-s32k344-build:
    name: Zephyr S32K344 cross-compile
    runs-on: ubuntu-latest
    container: { image: "ghcr.io/zephyrproject-rtos/ci:v0.27.4" }
    env:
      ZEPHYR_SDK_INSTALL_DIR: /opt/zephyr-sdk-0.17.0
    steps:
      - uses: actions/checkout@v4
      - name: Install Python 3.12
        run: |
          apt-get update -qq
          apt-get install -y -qq software-properties-common > /dev/null
          add-apt-repository -y ppa:deadsnakes/ppa > /dev/null 2>&1
          apt-get update -qq
          apt-get install -y -qq python3.12 python3.12-venv > /dev/null
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 2
          python3.12 -m ensurepip --upgrade
          python3.12 -m pip install --upgrade pip
      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.0/zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.0/toolchain_linux-x86_64_arm-zephyr-eabi.tar.xz
          tar xf zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz -C /opt/
          tar xf toolchain_linux-x86_64_arm-zephyr-eabi.tar.xz -C /opt/zephyr-sdk-0.17.0/
          /opt/zephyr-sdk-0.17.0/setup.sh -c
      - name: Init Zephyr
        run: |
          python3.12 -m pip install jsonschema west
          west init --mr v4.3.0 /tmp/zp && cd /tmp/zp
          west update --narrow -o=--depth=1 && west zephyr-export
          python3.12 -m pip install -r /tmp/zp/zephyr/scripts/requirements.txt
      - name: Build hello_s32k (mr_canhubk3)
        env: { ZEPHYR_BASE: /tmp/zp/zephyr }
        run: west build -b mr_canhubk3 zephyr/samples/hello_s32k -d build/s32k344

  zephyr-renode-s32k388:
    name: Zephyr S32K388 Renode Tests
    runs-on: ubuntu-latest
    container: { image: "ghcr.io/zephyrproject-rtos/ci:v0.27.4" }
    env:
      ZEPHYR_SDK_INSTALL_DIR: /opt/zephyr-sdk-0.17.0
      RENODE_VERSION: "1.15.3"
    steps:
      - uses: actions/checkout@v4
      - name: Install Python 3.12
        run: |
          apt-get update -qq
          apt-get install -y -qq software-properties-common > /dev/null
          add-apt-repository -y ppa:deadsnakes/ppa > /dev/null 2>&1
          apt-get update -qq
          apt-get install -y -qq python3.12 python3.12-venv > /dev/null
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 2
          python3.12 -m ensurepip --upgrade
          python3.12 -m pip install --upgrade pip
      - name: Install Zephyr SDK (ARM toolchain)
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.0/zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.0/toolchain_linux-x86_64_arm-zephyr-eabi.tar.xz
          tar xf zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz -C /opt/
          tar xf toolchain_linux-x86_64_arm-zephyr-eabi.tar.xz -C /opt/zephyr-sdk-0.17.0/
          /opt/zephyr-sdk-0.17.0/setup.sh -c
      - name: Install Renode
        run: |
          wget -q "https://github.com/renode/renode/releases/download/v${RENODE_VERSION}/renode-${RENODE_VERSION}.linux-portable.tar.gz"
          mkdir -p /opt/renode
          tar xzf "renode-${RENODE_VERSION}.linux-portable.tar.gz" -C /opt/renode --strip-components=1
          ln -s /opt/renode/renode /usr/local/bin/renode
      - name: Init Zephyr
        run: |
          python3.12 -m pip install jsonschema west
          west init --mr v4.3.0 /tmp/zp && cd /tmp/zp
          west update --narrow -o=--depth=1 && west zephyr-export
          python3.12 -m pip install -r /tmp/zp/zephyr/scripts/requirements.txt
      - name: Build & run test_core on Renode
        env: { ZEPHYR_BASE: /tmp/zp/zephyr }
        run: |
          ./scripts/run_renode_test.sh test_core \
            --timeout 60 \
            --junit-output /tmp/renode_test_core_junit.xml
      - name: Upload Renode test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-zephyr-renode
          path: /tmp/renode_*_junit.xml
          retention-days: 14

  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [host-build, zephyr-native-sim, zephyr-renode-s32k388]
    if: always()
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        with:
          files: "**/*junit*.xml"
          check_name: "Zephyr Test Results"
          comment_mode: "off"

      - name: Detailed Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: "Zephyr Test Report"
          path: "**/*junit*.xml"
          reporter: java-junit
          list-tests: 'all'
          list-suites: 'all'
          use-actions-summary: 'true'
