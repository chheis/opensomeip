# Generate and publish Allure Report with historical trends
#
# Triggered after the CI workflow completes on main. Downloads all JUnit/GTest
# XML artifacts, merges them into a single Allure report with trend history
# persisted on the gh-pages branch, and deploys to /allure/ on GitHub Pages.

name: Allure Report

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  actions: read

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  allure-report:
    if: github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Download CTest/pytest results from CI
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          pattern: test-results-*
          path: ci-artifacts
        continue-on-error: true

      - name: Download GTest detailed results from CI
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          pattern: gtest-results-*
          path: ci-artifacts
        continue-on-error: true

      - name: Download native Allure results from CI
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          pattern: allure-results-*
          path: ci-allure-native
        continue-on-error: true

      - name: Collect test results into Allure results
        id: collect
        run: |
          mkdir -p allure-results
          # Copy JUnit/GTest XML (C++ tests)
          if [ -d ci-artifacts ]; then
            find ci-artifacts -name '*.xml' -type f | while read -r f; do
              dir="$(basename "$(dirname "$f")")"
              base="$(basename "$f")"
              cp "$f" "allure-results/${dir}__${base}"
            done
          fi
          # Copy native Allure results (Python tests) — these contain
          # rich test body, steps, and attachments
          if [ -d ci-allure-native ]; then
            find ci-allure-native -type f | while read -r f; do
              dir="$(basename "$(dirname "$f")")"
              base="$(basename "$f")"
              cp "$f" "allure-results/${dir}__${base}"
            done
          fi
          xml_count=$(find allure-results -name '*.xml' -type f | wc -l)
          json_count=$(find allure-results -name '*-result.json' -type f | wc -l)
          total=$((xml_count + json_count))
          echo "Collected ${xml_count} XML + ${json_count} native Allure result files"
          if [ "$total" -eq 0 ]; then
            echo "::warning::No test results found — skipping report generation and deploy"
          fi
          echo "has_results=$([ "$total" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Write environment metadata
        if: steps.collect.outputs.has_results == 'true'
        run: |
          cat > allure-results/environment.properties <<PROPS
          Branch=${{ github.event.workflow_run.head_branch }}
          Commit=${{ github.event.workflow_run.head_sha }}
          Run=#${{ github.event.workflow_run.run_number }}
          Event=${{ github.event.workflow_run.event }}
          Conclusion=${{ github.event.workflow_run.conclusion }}
          PROPS

      - name: Write Allure categories
        if: steps.collect.outputs.has_results == 'true'
        run: |
          cat > allure-results/categories.json <<'CATS'
          [
            {
              "name": "Known issues",
              "matchedStatuses": ["failed", "broken"],
              "messageRegex": "(?i).*(known[\\s_-]?(issue|defect|bug)|xfail|disabled).*",
              "traceRegex": "(?i).*(known[\\s_-]?(issue|defect|bug)|xfail|disabled).*",
              "flaky": true
            },
            {
              "name": "Product defects",
              "matchedStatuses": ["failed"]
            },
            {
              "name": "Test defects",
              "matchedStatuses": ["broken"]
            }
          ]
          CATS

      - name: Checkout gh-pages for Allure history
        if: steps.collect.outputs.has_results == 'true'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Restore Allure history
        if: steps.collect.outputs.has_results == 'true'
        run: |
          if [ -d gh-pages/allure/history ]; then
            cp -r gh-pages/allure/history allure-results/history
            echo "Restored history ($(ls allure-results/history/ | wc -l) entries)"
          else
            echo "No previous Allure history found (first run)"
          fi

      - name: Set up JDK
        if: steps.collect.outputs.has_results == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Allure CLI
        if: steps.collect.outputs.has_results == 'true'
        run: |
          ALLURE_VERSION="2.30.0"
          curl -sL "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz" \
            | tar xzf -
          echo "$PWD/allure-${ALLURE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Write executor info
        if: steps.collect.outputs.has_results == 'true'
        run: |
          cat > allure-results/executor.json <<EXEC
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "CI #${{ github.event.workflow_run.run_number }}",
            "buildUrl": "${{ github.event.workflow_run.html_url }}",
            "reportUrl": "https://vtz.github.io/opensomeip/allure/"
          }
          EXEC

      - name: Generate Allure report
        if: steps.collect.outputs.has_results == 'true'
        run: allure generate allure-results -o allure-report --clean

      - name: Deploy Allure report to GitHub Pages
        if: steps.collect.outputs.has_results == 'true'
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: allure
