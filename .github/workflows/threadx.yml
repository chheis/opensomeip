name: ThreadX Build & Test

on:
  push:
    branches: ["main"]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.cursor/**'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.cursor/**'

permissions:
  contents: read

jobs:
  stub-compile-check:
    name: ThreadX+lwIP stub compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with ThreadX+lwIP stubs
        run: |
          cmake -B build_threadx \
            -DSOMEIP_USE_THREADX=ON \
            -DSOMEIP_USE_LWIP=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_CXX_FLAGS="-I${{ github.workspace }}/tests/stubs/threadx -I${{ github.workspace }}/tests/stubs/lwip" \
            -S ${{ github.workspace }}
          cmake --build build_threadx

  stub-compile-check-fedora:
    name: ThreadX+lwIP stub compile check (Fedora 42)
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ cmake ninja-build git

      - uses: actions/checkout@v4

      - name: Build with ThreadX+lwIP stubs
        run: |
          cmake -G Ninja -B build_threadx \
            -DSOMEIP_USE_THREADX=ON \
            -DSOMEIP_USE_LWIP=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_CXX_FLAGS="-I$(pwd)/tests/stubs/threadx -I$(pwd)/tests/stubs/lwip"
          cmake --build build_threadx

  runtime-tests:
    name: ThreadX Linux port runtime tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & run ThreadX Linux port tests
        run: |
          cmake -B build_threadx_rt \
            -DSOMEIP_THREADX_LINUX_TESTS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -S ${{ github.workspace }}
          cmake --build build_threadx_rt --config Release
          cd build_threadx_rt && ctest --output-on-failure --timeout 30 --no-tests=error --output-junit junit_results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-threadx
          path: build_threadx_rt/junit_results.xml
          retention-days: 14

  runtime-tests-fedora:
    name: ThreadX Linux port runtime tests (Fedora 42)
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ cmake ninja-build git

      - uses: actions/checkout@v4

      - name: Build & run ThreadX Linux port tests
        run: |
          cmake -G Ninja -B build_threadx_rt \
            -DSOMEIP_THREADX_LINUX_TESTS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build_threadx_rt --config Release
          cd build_threadx_rt && ctest --output-on-failure --timeout 30 --no-tests=error --output-junit junit_results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-threadx-fedora42
          path: build_threadx_rt/junit_results.xml
          retention-days: 14

  coverage:
    name: ThreadX coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install coverage tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcovr

      - name: Build with coverage
        run: |
          cmake -B build_threadx_cov \
            -DSOMEIP_THREADX_LINUX_TESTS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -S ${{ github.workspace }}
          cmake --build build_threadx_cov

      - name: Run tests
        working-directory: build_threadx_cov
        run: ctest --output-on-failure --timeout 30 --no-tests=error

      - name: Generate coverage report
        run: |
          gcovr --root . \
            --filter 'src/' \
            --filter 'include/' \
            --exclude '.*test.*' \
            --exclude '.*example.*' \
            --xml coverage-threadx.xml \
            --print-summary

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-threadx
          path: coverage-threadx.xml
          retention-days: 14

  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [runtime-tests, runtime-tests-fedora]
    if: always()
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        with:
          files: "**/junit_results.xml"
          check_name: "ThreadX Test Results"
