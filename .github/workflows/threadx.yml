name: ThreadX Build & Test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile-check:
    name: ThreadX PAL compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (threadx-compile-check preset)
        run: cmake --preset threadx-compile-check

      - name: Build
        run: cmake --build --preset threadx-compile-check

  cross-compile-check:
    name: ThreadX ARM Cortex-M4 cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Configure (threadx-cortexm4 preset)
        run: cmake --preset threadx-cortexm4

      - name: Build
        run: cmake --build --preset threadx-cortexm4

  compile-check-fedora:
    name: ThreadX PAL compile check (Fedora 42)
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ cmake ninja-build git

      - uses: actions/checkout@v4

      - name: Configure (threadx-compile-check preset)
        run: cmake --preset threadx-compile-check

      - name: Build
        run: cmake --build --preset threadx-compile-check

  runtime-tests:
    name: ThreadX Linux port runtime tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (threadx-linux-tests preset)
        run: cmake --preset threadx-linux-tests

      - name: Build
        run: cmake --build --preset threadx-linux-tests

      - name: Test
        run: ctest --preset threadx-linux-tests --output-junit junit_results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-threadx
          path: build/threadx-linux-tests/junit_results.xml
          retention-days: 14

  runtime-tests-fedora:
    name: ThreadX Linux port runtime tests (Fedora 42)
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ cmake ninja-build git

      - uses: actions/checkout@v4

      - name: Build & run ThreadX Linux port tests
        run: |
          cmake -G Ninja -B build_threadx_rt \
            -DSOMEIP_THREADX_LINUX_TESTS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build_threadx_rt --config Release
          cd build_threadx_rt && ctest --output-on-failure --timeout 30 --no-tests=error --output-junit junit_results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-threadx-fedora42
          path: build_threadx_rt/junit_results.xml
          retention-days: 14

  coverage:
    name: ThreadX coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install coverage tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcovr

      - name: Build with coverage
        run: |
          cmake -B build_threadx_cov \
            -DSOMEIP_THREADX_LINUX_TESTS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -S ${{ github.workspace }}
          cmake --build build_threadx_cov

      - name: Run tests
        working-directory: build_threadx_cov
        run: ctest --output-on-failure --timeout 30 --no-tests=error

      - name: Generate coverage report
        run: |
          gcovr --root . \
            --filter 'src/' \
            --filter 'include/' \
            --exclude '.*test.*' \
            --exclude '.*example.*' \
            --xml coverage-threadx.xml \
            --print-summary

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-threadx
          path: coverage-threadx.xml
          retention-days: 14

  renode-cortexm4:
    name: ThreadX Cortex-M4 Renode Tests
    runs-on: ubuntu-latest
    env:
      RENODE_VERSION: "1.15.3"
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Install Renode
        run: |
          wget -q "https://github.com/renode/renode/releases/download/v${RENODE_VERSION}/renode-${RENODE_VERSION}.linux-portable.tar.gz"
          sudo mkdir -p /opt/renode
          sudo tar xzf "renode-${RENODE_VERSION}.linux-portable.tar.gz" -C /opt/renode --strip-components=1
          sudo ln -s /opt/renode/renode /usr/local/bin/renode

      - name: Build & run ThreadX tests on Renode
        run: |
          ./scripts/run_threadx_renode_test.sh \
            --timeout 60 \
            --junit-output /tmp/threadx_renode_junit.xml

      - name: Upload Renode test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-threadx-renode
          path: /tmp/threadx_renode_junit.xml
          retention-days: 14

  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [runtime-tests, runtime-tests-fedora, renode-cortexm4]
    if: always()
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-threadx*

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        with:
          files: "**/*junit*.xml"
          check_name: "ThreadX Test Results"
          comment_mode: "off"

      - name: Detailed Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: "ThreadX Test Report"
          path: "**/*junit*.xml"
          reporter: java-junit
          list-tests: 'all'
          list-suites: 'all'
          use-actions-summary: 'true'
