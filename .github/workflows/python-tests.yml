name: Python Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r tests/python/requirements.txt

      - name: Build C++ project
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Run Python integration tests
        working-directory: tests/python
        run: >
          python -m pytest ../integration/ ../system/
          -v --tb=short -ra
          --junitxml=junit_results.xml
          --cov=someip_test_framework
          --cov-report=xml:coverage.xml
          --cov-report=term-missing
          -k "not performance and not slow"
        continue-on-error: true

      - name: Upload Python test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-python
          path: tests/python/junit_results.xml
          retention-days: 14

      - name: Upload Python coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage
          path: tests/python/coverage.xml
          retention-days: 14

  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [python-tests]
    if: always()
    permissions:
      checks: write
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-python*

      - name: Set test suite names in JUnit XML
        run: |
          for dir in test-results-*/; do
            suite=$(echo "$dir" | sed 's|^test-results-||;s|/$||')
            for xml in "$dir"*.xml; do
              [ -f "$xml" ] && sed -i "s/<testsuite name=\"pytest\"/<testsuite name=\"${suite}\"/" "$xml"
            done
          done

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        with:
          files: "**/*junit*.xml"
          check_name: "Python Test Results"
          comment_mode: "off"
          fail_on: "nothing"

      - name: Convert JUnit XML to CTRF
        if: always()
        run: npx junit-to-ctrf@0.0.14 "test-results-*/**/*.xml" -o ctrf/python-report.json -t pytest

      - name: Detailed Test Report
        uses: ctrf-io/github-test-reporter@31e2a2735dd4641c65c2f49eb07e93ce8ec37fff # v1
        if: always()
        with:
          report-path: 'ctrf/python-report.json'
          title: 'Python Test Report'
          summary-report: true
          failed-report: true
          suite-list-report: true
          test-report: true
          use-suite-name: true
          exit-on-fail: false

      - name: Create Python Test Check Run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          REPORT="ctrf/python-report.json"
          if [ ! -f "$REPORT" ]; then echo "No CTRF report found"; exit 0; fi
          TOTAL=$(jq '.results.summary.tests' "$REPORT")
          PASSED=$(jq '.results.summary.passed' "$REPORT")
          FAILED=$(jq '.results.summary.failed' "$REPORT")
          SKIPPED=$(jq '.results.summary.skipped' "$REPORT")
          CONCLUSION="success"; [ "$FAILED" -gt 0 ] && CONCLUSION="failure"
          BODY="## Python Test Report"$'\n\n'"| Tests | Passed | Failed | Skipped |"$'\n'"|-|-|-|-|"$'\n'"| $TOTAL | $PASSED | $FAILED | $SKIPPED |"
          if [ "$FAILED" -gt 0 ]; then
            FAILS=$(jq -r '[.results.tests[] | select(.status=="failed")] | .[0:50] | .[] | "| \(.suite // "-") | \(.name) |"' "$REPORT")
            BODY="$BODY"$'\n\n'"### Failed Tests"$'\n'"| Suite | Test |"$'\n'"|-|-|"$'\n'"$FAILS"
          fi
          gh api repos/${{ github.repository }}/check-runs \
            -f "head_sha=${SHA}" \
            -f "name=Python Detailed Test Report" \
            -f "status=completed" \
            -f "conclusion=${CONCLUSION}" \
            -f "output[title]=Python: ${PASSED}/${TOTAL} passed" \
            -f "output[summary]=${BODY}"
