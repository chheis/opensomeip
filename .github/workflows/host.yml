name: Host Build & Test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        build_type: [Release]
        c_compiler: [gcc, clang]
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (MSVC)
        if: matrix.c_compiler == 'cl'
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DENABLE_WERROR=ON
          -S ${{ github.workspace }}

      - name: Configure CMake (GCC/Clang)
        if: matrix.c_compiler != 'cl'
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DENABLE_WERROR=ON
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/gtest_results"
          export GTEST_OUTPUT="xml:$GITHUB_WORKSPACE/gtest_results/"
          ctest --build-config ${{ matrix.build_type }} --output-on-failure --timeout 30 --no-tests=error --output-junit junit_results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-host-${{ matrix.os }}-${{ matrix.c_compiler }}
          path: ${{ steps.strings.outputs.build-output-dir }}/junit_results.xml
          retention-days: 14

      - name: Upload GTest detailed results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gtest-results-host-${{ matrix.os }}-${{ matrix.c_compiler }}
          path: ${{ github.workspace }}/gtest_results/
          retention-days: 14

  build-fedora:
    name: Fedora 42 (${{ matrix.c_compiler }})
    runs-on: ubuntu-latest
    container:
      image: fedora:42
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        c_compiler: [gcc, clang]
        include:
          - c_compiler: gcc
            cpp_compiler: g++
          - c_compiler: clang
            cpp_compiler: clang++

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ clang cmake ninja-build git

      - uses: actions/checkout@v4

      - name: Configure CMake
        run: >
          cmake -G Ninja -B build
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=Release
          -DENABLE_WERROR=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: |
          mkdir -p "$GITHUB_WORKSPACE/gtest_results"
          export GTEST_OUTPUT="xml:$GITHUB_WORKSPACE/gtest_results/"
          ctest --build-config Release --output-on-failure --timeout 30 --no-tests=error --output-junit junit_results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-host-fedora42-${{ matrix.c_compiler }}
          path: build/junit_results.xml
          retention-days: 14

      - name: Upload GTest detailed results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gtest-results-host-fedora42-${{ matrix.c_compiler }}
          path: ${{ github.workspace }}/gtest_results/
          retention-days: 14

  coverage:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcovr lcov

      - name: Configure CMake with coverage
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage"
          -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage"
          -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build with coverage
        run: cmake --build build

      - name: Run tests
        working-directory: build
        run: |
          mkdir -p "$GITHUB_WORKSPACE/gtest_results"
          export GTEST_OUTPUT="xml:$GITHUB_WORKSPACE/gtest_results/"
          ctest --output-on-failure --timeout 30 --no-tests=error --output-junit junit_results.xml

      - name: Generate coverage report
        run: |
          gcovr --root . \
            --filter 'src/' \
            --filter 'include/' \
            --exclude '.*test.*' \
            --exclude '.*example.*' \
            --xml coverage.xml \
            --html-details coverage.html \
            --print-summary

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-host
          path: |
            coverage.xml
            coverage.html
            coverage.*.html
          retention-days: 14

      - name: Upload coverage test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-host-coverage
          path: build/junit_results.xml
          retention-days: 14

      - name: Upload GTest detailed results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gtest-results-host-coverage
          path: ${{ github.workspace }}/gtest_results/
          retention-days: 14

      - name: Code Coverage Summary
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        if: always()
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: both
          fail_below_min: false

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-summary-host
          path: code-coverage-results.md
          retention-days: 14

      - name: Write coverage to Job Summary
        if: always()
        run: |
          if [ -f code-coverage-results.md ]; then
            cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "*Coverage summary not available.*" >> "$GITHUB_STEP_SUMMARY"
          fi

  sanitizers:
    name: ASan + UBSan (${{ matrix.c_compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        c_compiler: [gcc, clang]
        include:
          - c_compiler: gcc
            cpp_compiler: g++
          - c_compiler: clang
            cpp_compiler: clang++

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (Debug + Sanitizers)
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=Debug
          -DSAFETY_LEVEL=ASIL_B
          -DENABLE_WERROR=ON

      - name: Build
        run: cmake --build build

      - name: Test under sanitizers
        working-directory: build
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:print_stats=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --output-on-failure --timeout 60 --no-tests=error --output-junit junit_results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-sanitizers-${{ matrix.c_compiler }}
          path: build/junit_results.xml
          retention-days: 14

  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [build, build-fedora, coverage, sanitizers]
    if: always()
    permissions:
      checks: write
    steps:
      - name: Download GTest detailed results
        uses: actions/download-artifact@v4
        with:
          pattern: gtest-results-host-*
          path: gtest-downloads

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        with:
          files: "gtest-downloads/**/*.xml"
          check_name: "Host Test Results"
          comment_mode: "off"

      - name: Tag GTest XMLs with build variant
        if: always()
        run: |
          for dir in gtest-downloads/gtest-results-host-*/; do
            variant=$(basename "$dir" | sed 's/^gtest-results-host-//')
            for xml in "$dir"*.xml; do
              [ -f "$xml" ] && sed -i \
                -e "s/<testsuite name=\"/<testsuite name=\"[${variant}] /g" \
                -e "s/classname=\"/classname=\"[${variant}] /g" "$xml"
            done
          done

      - name: Convert GTest XML to CTRF
        if: always()
        run: npx junit-to-ctrf@0.0.14 "gtest-downloads/**/*.xml" -o ctrf/host-report.json -t host

      - name: Detailed Test Report
        uses: ctrf-io/github-test-reporter@31e2a2735dd4641c65c2f49eb07e93ce8ec37fff # v1
        if: always()
        with:
          report-path: 'ctrf/host-report.json'
          title: 'Host Test Report'
          summary-report: true
          failed-report: true
          suite-list-report: true
          test-report: true
          use-suite-name: true

      - name: Create Host Test Check Run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          REPORT="ctrf/host-report.json"
          if [ ! -f "$REPORT" ]; then echo "No CTRF report found"; exit 0; fi
          TOTAL=$(jq '.results.summary.tests' "$REPORT")
          PASSED=$(jq '.results.summary.passed' "$REPORT")
          FAILED=$(jq '.results.summary.failed' "$REPORT")
          SKIPPED=$(jq '.results.summary.skipped' "$REPORT")
          CONCLUSION="success"; [ "$FAILED" -gt 0 ] && CONCLUSION="failure"
          BODY="## Host Test Report"$'\n\n'"| Tests | Passed | Failed | Skipped |"$'\n'"|-|-|-|-|"$'\n'"| $TOTAL | $PASSED | $FAILED | $SKIPPED |"
          if [ "$FAILED" -gt 0 ]; then
            FAILS=$(jq -r '[.results.tests[] | select(.status=="failed")] | .[0:50] | .[] | "| \(.suite // "-") | \(.name) |"' "$REPORT")
            BODY="$BODY"$'\n\n'"### Failed Tests"$'\n'"| Suite | Test |"$'\n'"|-|-|"$'\n'"$FAILS"
          fi
          gh api repos/${{ github.repository }}/check-runs \
            -f "head_sha=${SHA}" \
            -f "name=Host Detailed Test Report" \
            -f "status=completed" \
            -f "conclusion=${CONCLUSION}" \
            -f "output[title]=Host: ${PASSED}/${TOTAL} passed" \
            -f "output[summary]=${BODY}"
