name: FreeRTOS Build & Test

on:
  push:
    branches: ["main"]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.cursor/**'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.cursor/**'

permissions:
  contents: read

jobs:
  stub-compile-check:
    name: FreeRTOS+lwIP stub compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with FreeRTOS+lwIP stubs
        run: |
          cmake -B build_freertos \
            -DSOMEIP_USE_FREERTOS=ON \
            -DSOMEIP_USE_LWIP=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_CXX_FLAGS="-I${{ github.workspace }}/tests/stubs/freertos -I${{ github.workspace }}/tests/stubs/lwip" \
            -S ${{ github.workspace }}
          cmake --build build_freertos

  runtime-tests:
    name: FreeRTOS POSIX port runtime tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & run FreeRTOS POSIX port tests
        run: |
          cmake -B build_freertos_rt \
            -DSOMEIP_FREERTOS_LINUX_TESTS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -S ${{ github.workspace }}
          cmake --build build_freertos_rt --config Release
          cd build_freertos_rt && ctest --output-on-failure --timeout 30 --no-tests=error --output-junit junit_results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-freertos
          path: build_freertos_rt/junit_results.xml
          retention-days: 14

  coverage:
    name: FreeRTOS coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install coverage tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcovr

      - name: Build with coverage
        run: |
          cmake -B build_freertos_cov \
            -DSOMEIP_FREERTOS_LINUX_TESTS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -S ${{ github.workspace }}
          cmake --build build_freertos_cov

      - name: Run tests
        working-directory: build_freertos_cov
        run: ctest --output-on-failure --timeout 30 --no-tests=error

      - name: Generate coverage report
        run: |
          gcovr --root . \
            --filter 'src/' \
            --filter 'include/' \
            --exclude '.*test.*' \
            --exclude '.*example.*' \
            --xml coverage-freertos.xml \
            --print-summary

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-freertos
          path: coverage-freertos.xml
          retention-days: 14

  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [runtime-tests]
    if: always()
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        with:
          files: "**/junit_results.xml"
          check_name: "FreeRTOS Test Results"
