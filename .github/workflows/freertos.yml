name: FreeRTOS Build & Test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile-check:
    name: FreeRTOS PAL compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (freertos-compile-check preset)
        run: cmake --preset freertos-compile-check

      - name: Build
        run: cmake --build --preset freertos-compile-check

  cross-compile-check:
    name: FreeRTOS ARM Cortex-M4 cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Configure (freertos-cortexm4 preset)
        run: cmake --preset freertos-cortexm4

      - name: Build
        run: cmake --build --preset freertos-cortexm4

  compile-check-fedora:
    name: FreeRTOS PAL compile check (Fedora 42)
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ cmake ninja-build git

      - uses: actions/checkout@v4

      - name: Configure (freertos-compile-check preset)
        run: cmake --preset freertos-compile-check

      - name: Build
        run: cmake --build --preset freertos-compile-check

  runtime-tests:
    name: FreeRTOS POSIX port runtime tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (freertos-linux-tests preset)
        run: cmake --preset freertos-linux-tests

      - name: Build
        run: cmake --build --preset freertos-linux-tests

      - name: Test
        run: ctest --preset freertos-linux-tests --output-junit junit_results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-freertos
          path: build/freertos-linux-tests/junit_results.xml
          retention-days: 14

  runtime-tests-fedora:
    name: FreeRTOS POSIX port runtime tests (Fedora 42)
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc gcc-c++ cmake ninja-build git

      - uses: actions/checkout@v4

      - name: Build & run FreeRTOS POSIX port tests
        run: |
          cmake -G Ninja -B build_freertos_rt \
            -DSOMEIP_FREERTOS_LINUX_TESTS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build_freertos_rt --config Release
          cd build_freertos_rt && ctest --output-on-failure --timeout 30 --no-tests=error --output-junit junit_results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-freertos-fedora42
          path: build_freertos_rt/junit_results.xml
          retention-days: 14

  coverage:
    name: FreeRTOS coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install coverage tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcovr

      - name: Build with coverage
        run: |
          cmake -B build_freertos_cov \
            -DSOMEIP_FREERTOS_LINUX_TESTS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -S ${{ github.workspace }}
          cmake --build build_freertos_cov

      - name: Run tests
        working-directory: build_freertos_cov
        run: ctest --output-on-failure --timeout 30 --no-tests=error

      - name: Generate coverage report
        run: |
          gcovr --root . \
            --filter 'src/' \
            --filter 'include/' \
            --exclude '.*test.*' \
            --exclude '.*example.*' \
            --xml coverage-freertos.xml \
            --print-summary

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-freertos
          path: coverage-freertos.xml
          retention-days: 14

  renode-cortexm4:
    name: FreeRTOS Cortex-M4 Renode Tests
    runs-on: ubuntu-latest
    env:
      RENODE_VERSION: "1.15.3"
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Install Renode
        run: |
          wget -q "https://github.com/renode/renode/releases/download/v${RENODE_VERSION}/renode-${RENODE_VERSION}.linux-portable.tar.gz"
          sudo mkdir -p /opt/renode
          sudo tar xzf "renode-${RENODE_VERSION}.linux-portable.tar.gz" -C /opt/renode --strip-components=1
          sudo ln -s /opt/renode/renode /usr/local/bin/renode

      - name: Build & run FreeRTOS tests on Renode
        run: |
          ./scripts/run_freertos_renode_test.sh \
            --timeout 60 \
            --junit-output /tmp/freertos_renode_junit.xml

      - name: Upload Renode test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-freertos-renode
          path: /tmp/freertos_renode_junit.xml
          retention-days: 14

  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [runtime-tests, runtime-tests-fedora, renode-cortexm4]
    if: always()
    permissions:
      checks: write
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-freertos*

      - name: Set test suite names in JUnit XML
        run: |
          for dir in test-results-*/; do
            suite=$(echo "$dir" | sed 's|^test-results-||;s|/$||')
            for xml in "$dir"*.xml; do
              [ -f "$xml" ] && sed -i "s/<testsuite name=\"(empty)\"/<testsuite name=\"${suite}\"/" "$xml"
            done
          done

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        with:
          files: "**/*junit*.xml"
          check_name: "FreeRTOS Test Results"
          comment_mode: "off"

      - name: Convert JUnit XML to CTRF
        if: always()
        run: npx junit-to-ctrf@0.0.14 "test-results-*/**/*.xml" -o ctrf/freertos-report.json -t freertos

      - name: Detailed Test Report
        uses: ctrf-io/github-test-reporter@31e2a2735dd4641c65c2f49eb07e93ce8ec37fff # v1
        if: always()
        with:
          report-path: 'ctrf/freertos-report.json'
          title: 'FreeRTOS Test Report'
          summary-report: true
          failed-report: true
          suite-list-report: true
          test-report: true
          use-suite-name: true

      - name: Create FreeRTOS Test Check Run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          REPORT="ctrf/freertos-report.json"
          if [ ! -f "$REPORT" ]; then echo "No CTRF report found"; exit 0; fi
          TOTAL=$(jq '.results.summary.tests' "$REPORT")
          PASSED=$(jq '.results.summary.passed' "$REPORT")
          FAILED=$(jq '.results.summary.failed' "$REPORT")
          SKIPPED=$(jq '.results.summary.skipped' "$REPORT")
          CONCLUSION="success"; [ "$FAILED" -gt 0 ] && CONCLUSION="failure"
          BODY="## FreeRTOS Test Report"$'\n\n'"| Tests | Passed | Failed | Skipped |"$'\n'"|-|-|-|-|"$'\n'"| $TOTAL | $PASSED | $FAILED | $SKIPPED |"
          if [ "$FAILED" -gt 0 ]; then
            FAILS=$(jq -r '[.results.tests[] | select(.status=="failed")] | .[0:50] | .[] | "| \(.suite // "-") | \(.name) |"' "$REPORT")
            BODY="$BODY"$'\n\n'"### Failed Tests"$'\n'"| Suite | Test |"$'\n'"|-|-|"$'\n'"$FAILS"
          fi
          gh api repos/${{ github.repository }}/check-runs \
            -f "head_sha=${SHA}" \
            -f "name=FreeRTOS Detailed Test Report" \
            -f "status=completed" \
            -f "conclusion=${CONCLUSION}" \
            -f "output[title]=FreeRTOS: ${PASSED}/${TOTAL} passed" \
            -f "output[summary]=${BODY}"
