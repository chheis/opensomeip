# Publish Project Documentation to GitHub Pages
#
# Builds the full project site with MkDocs Material, plus the Sphinx
# requirements documentation and traceability matrix.

name: Publish Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install \
            "mkdocs-material>=9.5,<10" \
            "sphinx>=7.0" "sphinx-needs>=5.0.0" sphinxcontrib-plantuml
          pip install -r open-someip-spec/requirements.txt

      - name: Build open-someip-spec
        working-directory: open-someip-spec
        run: |
          sphinx-build -b needs src build

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF

      - name: Extract code requirements
        run: |
          python scripts/extract_code_requirements.py \
            --project-root . \
            --output build/code_references.json \
            --src-dirs src include \
            --test-dirs tests

      - name: Build requirements documentation (Sphinx)
        run: |
          sphinx-build -b html docs/requirements build/docs/requirements

      - name: Generate traceability matrix
        run: |
          python scripts/generate_traceability_matrix.py \
            --project-root . \
            --code-refs build/code_references.json \
            --output-dir build/docs/traceability

      - name: Generate implementation report
        run: |
          python scripts/generate_implementation_report.py \
            --project-root . \
            --output build/docs/traceability/implementation_report.md

      - name: Prepare site sources
        run: |
          ./scripts/prepare_site.sh

          # Copy CI-generated traceability MD reports so MkDocs renders them
          # natively.  Only gap_analysis.md and implementation_report.md have
          # generators today; implementation_verification.md and
          # spec_mapping_report.md are served as stubs from prepare_site.sh
          # until their generators are added.
          mkdir -p docs/specification
          for f in gap_analysis.md implementation_report.md; do
            src="build/docs/traceability/$f"
            dst="docs/specification/${f//_/-}"
            cp "$src" "$dst"
            # Ensure trailing newline so pre-commit end-of-file-fixer passes
            sed -i -e '$a\' "$dst"
          done

      - name: Build project site (MkDocs)
        run: |
          mkdocs build --site-dir build/site

      - name: Assemble final output
        run: |
          # MkDocs output is the main site
          mkdir -p build/site/requirements build/site/traceability

          # Copy Sphinx requirements into the site
          cp -r build/docs/requirements/* build/site/requirements/

          # Copy traceability matrix into the site
          cp -r build/docs/traceability/* build/site/traceability/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

  deploy:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
