name: Coverity Scan

on:
  schedule:
    - cron: '0 4 * * 1'
  push:
    branches: ["main"]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.cursor/**'

permissions:
  contents: read

jobs:
  coverity:
    runs-on: ubuntu-latest
    env:
      COVERITY_SCAN_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
      COVERITY_EMAIL: ${{ vars.COVERITY_EMAIL }}
    steps:
      - name: Validate required configuration
        run: |
          missing=0
          if [ -z "${COVERITY_SCAN_TOKEN}" ]; then
            echo "::error::COVERITY_SCAN_TOKEN secret is not set"
            missing=1
          fi
          if [ -z "${COVERITY_EMAIL}" ]; then
            echo "::error::COVERITY_EMAIL repository variable is not set"
            missing=1
          fi
          exit $missing

      - uses: actions/checkout@v4

      - name: Download Coverity Build Tool
        run: |
          curl -fsS \
            --form "token=${COVERITY_SCAN_TOKEN}" \
            --form "project=vtz-opensomeip" \
            -o coverity_tool.tgz \
            https://scan.coverity.com/download/linux64
          mkdir -p coverity_tool
          tar xzf coverity_tool.tgz --strip-components=1 -C coverity_tool

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_BUILD_TYPE=Release

      - name: Build with cov-build
        run: coverity_tool/bin/cov-build --dir cov-int cmake --build build

      - name: Submit to Coverity Scan
        run: |
          tar czf analysis-results.tgz cov-int
          curl -fsS \
            --form "token=${COVERITY_SCAN_TOKEN}" \
            --form "email=${COVERITY_EMAIL}" \
            --form file=@analysis-results.tgz \
            --form version="${{ github.sha }}" \
            --form description="Automated Coverity Scan from GitHub Actions" \
            https://scan.coverity.com/builds?project=vtz-opensomeip
