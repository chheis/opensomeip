services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace/someip
    working_dir: /workspace/someip
    stdin_open: true
    tty: true

  fedora-dev:
    build:
      context: .
      dockerfile: Dockerfile.fedora42
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/workspace/someip
    working_dir: /workspace/someip
    stdin_open: true
    tty: true
